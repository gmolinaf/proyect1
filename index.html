<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sistema de Trazabilidad · GMF</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 15px; font-weight: 500; }
  .conn { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.ok { background: #1D9E75; }
  .dot.err { background: #E24B4A; }
  nav { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 0 1.5rem; display: flex; gap: 0; }
  nav button { background: none; border: none; border-bottom: 2px solid transparent; padding: 14px 18px; font-size: 14px; cursor: pointer; color: #666; transition: all 0.15s; }
  nav button.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
  nav button:hover { color: #1a1a1a; }
  main { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
  .section { display: none; }
  .section.active { display: block; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 1rem; }
  .stat label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .stat span { font-size: 22px; font-weight: 500; }
  .card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .card h2 { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid #e0e0da; border-radius: 8px; font-size: 14px; background: #fafaf8; color: #1a1a1a; outline: none; transition: border 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: #888; background: #fff; }
  textarea { resize: vertical; min-height: 72px; }
  .row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 12px; }
  .row > div { flex: 1; }
  .turno-info { background: #f5f5f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; color: #555; display: flex; align-items: center; gap: 8px; }
  .turno-info strong { color: #1a1a1a; }
  btn, button { cursor: pointer; }
  .btn-primary { width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 15px; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-secondary { background: none; border: 1px solid #e0e0da; border-radius: 8px; padding: 9px 14px; font-size: 13px; cursor: pointer; color: #555; white-space: nowrap; transition: all 0.15s; }
  .btn-secondary:hover { border-color: #888; color: #1a1a1a; }
  .msg { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: 8px; display: none; }
  .msg.ok { background: #e1f5ee; color: #0F6E56; }
  .msg.error { background: #fcebeb; color: #A32D2D; }
  .msg.info { background: #f0f0ea; color: #555; }
  .registros { }
  .registro-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0ea; }
  .registro-row:last-child { border-bottom: none; }
  .registro-icon { width: 32px; height: 32px; border-radius: 8px; background: #f5f5f0; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .registro-info { flex: 1; min-width: 0; }
  .registro-info .folio { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .registro-info .meta { font-size: 12px; color: #888; margin-top: 2px; }
  .registro-right { text-align: right; flex-shrink: 0; }
  .registro-right .peso { font-size: 13px; font-weight: 500; }
  .registro-right .hora { font-size: 12px; color: #888; margin-top: 2px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-turno-mañana { background: #faeeda; color: #854F0B; }
  .badge-turno-tarde { background: #e6f1fb; color: #185FA5; }
  .badge-turno-noche { background: #eeedfe; color: #534AB7; }
  .empty { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
  @media (max-width: 600px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>🏭 Trazabilidad GMF</h1>
  <div class="conn">
    <div class="dot" id="dot"></div>
    <span id="conn-label">Conectando...</span>
  </div>
</header>

<nav>
  <button class="active" onclick="showSection('pesaje', this)">Pesaje</button>
  <button onclick="showSection('despacho', this)">Despacho</button>
  <button onclick="showSection('historial', this)">Historial</button>
</nav>

<main>

  <!-- PESAJE -->
  <div class="section active" id="sec-pesaje">
    <div class="stats">
      <div class="stat"><label>Fardos hoy</label><span id="s-fardos">—</span></div>
      <div class="stat"><label>Kilos hoy</label><span id="s-kilos">—</span></div>
      <div class="stat"><label>Turno</label><span id="s-turno">—</span></div>
      <div class="stat"><label>Último folio</label><span id="s-folio" style="font-size:13px;line-height:1.6;">—</span></div>
    </div>

    <div class="card">
      <h2>Nuevo fardo</h2>
      <div class="grid2">
        <div>
          <label>Bodega</label>
          <select id="bodega">
            <option>Renca</option><option>Maipú</option>
            <option>La Pintana</option><option>Talcahuano</option>
          </select>
        </div>
        <div>
          <label>Material</label>
          <select id="material">
            <option value="CU">Cobre (CU)</option>
            <option value="AL">Aluminio (AL)</option>
            <option value="FE">Fierro (FE)</option>
            <option value="PP">Plástico (PP)</option>
            <option value="PA">Papel (PA)</option>
          </select>
        </div>
      </div>
      <div class="grid2">
        <div>
          <label>Operador</label>
          <input type="text" id="operador" placeholder="Nombre operador"/>
        </div>
        <div>
          <label>Máquina</label>
          <select id="maquina">
            <option value="PRENSA-1">Prensa 1</option>
            <option value="PRENSA-2">Prensa 2</option>
            <option value="PRENSA-3">Prensa 3</option>
            <option value="TRITURADORA-1">Trituradora 1</option>
            <option value="MANUAL">Manual</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Peso (kg)</label>
          <input type="number" id="peso" placeholder="Ej: 342" min="1" max="9999"/>
        </div>
        <button class="btn-secondary" onclick="leerBalanza()">⟳ Leer balanza</button>
      </div>
      <div class="turno-info">
        🕐 Turno detectado: <strong id="turno-display">—</strong>
      </div>
      <button class="btn-primary" id="btn-registrar" onclick="registrarFardo()">
        + Registrar fardo e imprimir etiqueta
      </button>
      <div class="msg" id="msg-pesaje"></div>
    </div>

    <div class="card">
      <h2>Últimos registros</h2>
      <div id="lista-pesaje"><div class="empty">Cargando...</div></div>
    </div>
  </div>

  <!-- DESPACHO -->
  <div class="section" id="sec-despacho">
    <div class="card">
      <h2>Nuevo despacho</h2>
      <div class="grid3">
        <div>
          <label>Origen</label>
          <select id="d-origen">
            <option>Renca</option><option>Maipú</option>
            <option>La Pintana</option><option>Talcahuano</option>
          </select>
        </div>
        <div>
          <label>Destino</label>
          <select id="d-destino">
            <option>Cliente final</option><option>Renca</option>
            <option>Maipú</option><option>La Pintana</option><option>Talcahuano</option>
          </select>
        </div>
        <div>
          <label>Tipo</label>
          <select id="d-tipo">
            <option>Nacional</option><option>Internacional</option><option>Entre bodegas</option>
          </select>
        </div>
      </div>
      <div class="grid2">
        <div>
          <label>Operador</label>
          <input type="text" id="d-operador" placeholder="Nombre operador"/>
        </div>
        <div>
          <label>Transportista</label>
          <input type="text" id="d-transportista" placeholder="Empresa o nombre"/>
        </div>
      </div>
      <div class="grid2">
        <div>
          <label>Patente camión</label>
          <input type="text" id="d-patente" placeholder="Ej: ABCD12"/>
        </div>
        <div>
          <label>Peso neto confirmado (kg)</label>
          <input type="number" id="d-peso" placeholder="Peso real al salir" min="1"/>
        </div>
      </div>
      <div style="margin-bottom:12px;">
        <label>Observaciones</label>
        <textarea id="d-obs" placeholder="Notas, diferencias de peso, incidencias..."></textarea>
      </div>
      <button class="btn-primary" id="btn-despacho" onclick="registrarDespacho()">
        + Registrar despacho
      </button>
      <div class="msg" id="msg-despacho"></div>
    </div>

    <div class="card">
      <h2>Últimos despachos</h2>
      <div id="lista-despachos"><div class="empty">Cargando...</div></div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="section" id="sec-historial">
    <div class="card">
      <h2>Filtrar</h2>
      <div class="grid3">
        <div>
          <label>Desde</label>
          <input type="date" id="h-desde"/>
        </div>
        <div>
          <label>Hasta</label>
          <input type="date" id="h-hasta"/>
        </div>
        <div>
          <label>Bodega</label>
          <select id="h-bodega">
            <option value="">Todas</option>
            <option>Renca</option><option>Maipú</option>
            <option>La Pintana</option><option>Talcahuano</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" onclick="cargarHistorial()" style="margin-top:4px;">Buscar</button>
    </div>
    <div class="card">
      <h2>Resultados</h2>
      <div id="lista-historial"><div class="empty">Selecciona un rango de fechas</div></div>
    </div>
  </div>

</main>

<script>
const URL = 'https://zcjjgpamuszekiomygqz.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjampncGFtdXN6ZWtpb215Z3F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzA2NjYsImV4cCI6MjA5NjYwNjY2Nn0.3_WEmxpwPs6svbcrw1cS6C7Bc-N64PBoq9aoXxICwi4';
const H = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

function turno() {
  const h = new Date().getHours();
  if (h >= 6 && h < 14) return 'Mañana';
  if (h >= 14 && h < 22) return 'Tarde';
  return 'Noche';
}

function turnoFull() {
  const h = new Date().getHours();
  if (h >= 6 && h < 14) return 'Mañana (06:00–14:00)';
  if (h >= 14 && h < 22) return 'Tarde (14:00–22:00)';
  return 'Noche (22:00–06:00)';
}

function folio(bodega, mat) {
  const p = { 'Renca':'RE','Maipú':'MA','La Pintana':'LP','Talcahuano':'TA' };
  const yr = new Date().getFullYear().toString().slice(2);
  const n = String(Math.floor(Math.random()*99999)).padStart(5,'0');
  return `${p[bodega]||'XX'}01-${yr}-${n}-${mat}`;
}

function msg(id, txt, tipo) {
  const el = document.getElementById(id);
  el.textContent = txt; el.className = 'msg ' + tipo; el.style.display = 'block';
}

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'despacho') cargarDespachos();
  if (id === 'historial') setFechasDefault();
}

async function sb(path, opts) {
  const r = await fetch(URL + path, { headers: H, ...opts });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function cargarStats() {
  try {
    const hoy = new Date().toISOString().split('T')[0];
    const data = await sb(`/rest/v1/pesaje_data?timestamp=gte.${hoy}T00:00:00&select=peso,folio`);
    document.getElementById('s-fardos').textContent = data.length;
    document.getElementById('s-kilos').textContent = data.reduce((a,r)=>a+(r.peso||0),0).toLocaleString()+' kg';
    document.getElementById('s-turno').textContent = turno();
    document.getElementById('s-folio').textContent = data.length ? data[data.length-1].folio : '—';
    document.getElementById('turno-display').textContent = turnoFull();
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('conn-label').textContent = 'Conectado';
  } catch {
    document.getElementById('dot').className = 'dot err';
    document.getElementById('conn-label').textContent = 'Sin conexión';
  }
}

async function cargarPesajes() {
  try {
    const data = await sb('/rest/v1/pesaje_data?select=folio,peso,material_code,bodega,operador,maquina,turno,timestamp&order=timestamp.desc&limit=10');
    const el = document.getElementById('lista-pesaje');
    if (!data.length) { el.innerHTML = '<div class="empty">Sin registros aún</div>'; return; }
    el.innerHTML = data.map(r => {
      const dt = new Date(r.timestamp);
      const hora = dt.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
      const fecha = dt.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit'});
      const tc = r.turno==='Mañana'?'mañana':r.turno==='Tarde'?'tarde':'noche';
      return `<div class="registro-row">
        <div class="registro-icon">📦</div>
        <div class="registro-info">
          <div class="folio">${r.folio}</div>
          <div class="meta">${r.bodega||'—'} · ${r.material_code||'—'} · ${r.operador||'—'} · ${r.maquina||'—'} <span class="badge badge-turno-${tc}">${r.turno||'—'}</span></div>
        </div>
        <div class="registro-right">
          <div class="peso">${r.peso} kg</div>
          <div class="hora">${fecha} ${hora}</div>
        </div>
      </div>`;
    }).join('');
  } catch { document.getElementById('lista-pesaje').innerHTML = '<div class="empty">Error cargando</div>'; }
}

async function leerBalanza() {
  try {
    const r = await fetch('http://localhost:5000/weight_data');
    const d = await r.json();
    if (d.weight) { document.getElementById('peso').value = d.weight; msg('msg-pesaje','✓ Peso leído desde balanza: '+d.weight+' kg','ok'); }
    else msg('msg-pesaje','Sin lectura de balanza','error');
  } catch {
    const p = Math.floor(Math.random()*800)+100;
    document.getElementById('peso').value = p;
    msg('msg-pesaje','Balanza no conectada — peso simulado: '+p+' kg (modo demo)','info');
  }
}

async function registrarFardo() {
  const peso = parseInt(document.getElementById('peso').value);
  const bodega = document.getElementById('bodega').value;
  const material = document.getElementById('material').value;
  const operador = document.getElementById('operador').value.trim();
  const maquina = document.getElementById('maquina').value;
  const btn = document.getElementById('btn-registrar');
  if (!peso||peso<=0) { msg('msg-pesaje','Ingresa un peso válido','error'); return; }
  if (!operador) { msg('msg-pesaje','Ingresa el nombre del operador','error'); return; }
  const f = folio(bodega, material);
  btn.disabled = true; btn.textContent = 'Registrando...';
  msg('msg-pesaje','Guardando...','info');
  try {
    await sb('/rest/v1/pesaje_data', { method:'POST', body: JSON.stringify({ folio:f, peso, material_code:material, bodega, operador, maquina, turno:turno() }) });
    msg('msg-pesaje','✓ Fardo registrado: '+f,'ok');
    document.getElementById('peso').value = '';
    await cargarStats(); await cargarPesajes();
    try { await fetch('http://localhost:5000/print_label',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folio:f,peso,material_code:material})}); } catch {}
  } catch(e) { msg('msg-pesaje','Error: '+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent='+ Registrar fardo e imprimir etiqueta'; }
}

async function registrarDespacho() {
  const origen = document.getElementById('d-origen').value;
  const destino = document.getElementById('d-destino').value;
  const tipo = document.getElementById('d-tipo').value;
  const operador = document.getElementById('d-operador').value.trim();
  const transportista = document.getElementById('d-transportista').value.trim();
  const patente = document.getElementById('d-patente').value.trim().toUpperCase();
  const peso = parseInt(document.getElementById('d-peso').value);
  const obs = document.getElementById('d-obs').value.trim();
  const btn = document.getElementById('btn-despacho');
  if (!operador) { msg('msg-despacho','Ingresa el operador','error'); return; }
  if (!peso||peso<=0) { msg('msg-despacho','Ingresa el peso neto','error'); return; }
  btn.disabled=true; btn.textContent='Registrando...';
  msg('msg-despacho','Guardando...','info');
  try {
    await sb('/rest/v1/despachos',{method:'POST',body:JSON.stringify({origen,destino,tipo_despacho:tipo,operador,transportista,patente,peso_neto_confirmado:peso,observaciones:obs})});
    msg('msg-despacho','✓ Despacho registrado correctamente','ok');
    ['d-operador','d-transportista','d-patente','d-peso','d-obs'].forEach(id=>document.getElementById(id).value='');
    await cargarDespachos();
  } catch(e) { msg('msg-despacho','Error: '+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent='+ Registrar despacho'; }
}

async function cargarDespachos() {
  try {
    const data = await sb('/rest/v1/despachos?select=*&order=timestamp.desc&limit=8');
    const el = document.getElementById('lista-despachos');
    if (!data.length) { el.innerHTML='<div class="empty">Sin despachos aún</div>'; return; }
    el.innerHTML = data.map(r=>{
      const dt = new Date(r.timestamp);
      const hora = dt.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
      const fecha = dt.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit'});
      return `<div class="registro-row">
        <div class="registro-icon">🚛</div>
        <div class="registro-info">
          <div class="folio">${r.origen} → ${r.destino}</div>
          <div class="meta">${r.tipo_despacho} · ${r.transportista||'—'} · ${r.patente||'—'} · Op: ${r.operador||'—'}</div>
          ${r.observaciones?`<div class="meta" style="color:#aaa;font-style:italic">${r.observaciones}</div>`:''}
        </div>
        <div class="registro-right">
          <div class="peso">${(r.peso_neto_confirmado||0).toLocaleString()} kg</div>
          <div class="hora">${fecha} ${hora}</div>
        </div>
      </div>`;
    }).join('');
  } catch { document.getElementById('lista-despachos').innerHTML='<div class="empty">Error cargando</div>'; }
}

function setFechasDefault() {
  const hoy = new Date().toISOString().split('T')[0];
  const hace7 = new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  document.getElementById('h-desde').value = hace7;
  document.getElementById('h-hasta').value = hoy;
}

async function cargarHistorial() {
  const desde = document.getElementById('h-desde').value;
  const hasta = document.getElementById('h-hasta').value;
  const bodega = document.getElementById('h-bodega').value;
  if (!desde||!hasta) { return; }
  let q = `/rest/v1/pesaje_data?timestamp=gte.${desde}T00:00:00&timestamp=lte.${hasta}T23:59:59&select=*&order=timestamp.desc`;
  if (bodega) q += `&bodega=eq.${bodega}`;
  try {
    const data = await sb(q);
    const el = document.getElementById('lista-historial');
    if (!data.length) { el.innerHTML='<div class="empty">Sin registros en ese período</div>'; return; }
    const totalKilos = data.reduce((a,r)=>a+(r.peso||0),0);
    el.innerHTML = `<div style="padding:10px 0 14px;border-bottom:1px solid #f0f0ea;margin-bottom:10px;display:flex;gap:20px;">
      <span style="font-size:13px;color:#888;">${data.length} fardos</span>
      <span style="font-size:13px;font-weight:500;">${totalKilos.toLocaleString()} kg total</span>
    </div>` + data.map(r=>{
      const dt = new Date(r.timestamp);
      const hora = dt.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
      const fecha = dt.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit'});
      return `<div class="registro-row">
        <div class="registro-icon">📦</div>
        <div class="registro-info">
          <div class="folio">${r.folio}</div>
          <div class="meta">${r.bodega||'—'} · ${r.material_code||'—'} · ${r.operador||'—'} · ${r.turno||'—'}</div>
        </div>
        <div class="registro-right">
          <div class="peso">${r.peso} kg</div>
          <div class="hora">${fecha} ${hora}</div>
        </div>
      </div>`;
    }).join('');
  } catch { document.getElementById('lista-historial').innerHTML='<div class="empty">Error</div>'; }
}
